services:
  - type: web
    name: arpus-jdm-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_BOOTSTRAP_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: arpus-jdm-db
          property: connectionString
      - key: CORS_ORIGINS
        value: http://localhost:5173,http://127.0.0.1:5173

databases:
  - name: arpus-jdm-db
    plan: free
